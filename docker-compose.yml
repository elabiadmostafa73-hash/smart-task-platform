version: '3.9'

services:

  frontend:
    build: ./frontend
    container_name: smart_frontend

    restart: always

  backend:
    build: ./backend
    container_name: smart_backend

    ports:
      - "5050:5000"

    environment:
      DB_USER: postgres
      DB_HOST: db
      DB_NAME: taskdb
      DB_PASSWORD: admin123
      DB_PORT: 5432
      JWT_SECRET: mysecretkey123
      PORT: 5000

    depends_on:
      - db

    restart: always

  db:
    image: postgres:16
    container_name: smart_postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: taskdb

    ports:
      - "5440:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: always

  nginx:
    image: nginx:latest
    container_name: smart_nginx

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - frontend
      - backend

    restart: always

volumes:
  postgres_data: