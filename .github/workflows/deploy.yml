name: Deploy To AWS

on:
  push:
    branches:
      - main

jobs:

  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Deploy to EC2

        uses: appleboy/ssh-action@master

        with:
          host: 3.226.81.114
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |

            cd ~/smart-task-platform

            git pull origin main

            sudo docker compose down

            sudo docker compose up --build -d